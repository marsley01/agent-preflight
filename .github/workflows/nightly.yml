name: Nightly

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  nightly:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Full test suite
        run: pnpm test -- --reporter=verbose
        continue-on-error: true

      - name: Run benchmarks
        run: pnpm vitest run --bench --reporter=json --outputFile=benchmark-results.json
        continue-on-error: true

      - name: Integration tests
        run: pnpm vitest run --project=integration --reporter=json --outputFile=integration-results.json
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-results
          path: |
            benchmark-results.json
            integration-results.json
            coverage/

      - name: Generate report
        if: always()
        run: |
          echo "# Nightly Build Report - $(date -u '+%Y-%m-%d')" > nightly-report.md
          echo "" >> nightly-report.md
          echo "## Summary" >> nightly-report.md
          echo "- Build: ${{ job.status }}" >> nightly-report.md
          echo "- Date: $(date -u)" >> nightly-report.md
          echo "- Commit: ${{ github.sha }}" >> nightly-report.md
          echo "" >> nightly-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-report
          path: nightly-report.md
