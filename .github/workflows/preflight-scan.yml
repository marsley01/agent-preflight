name: Preflight Scan

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run preflight scan
        id: scan
        run: |
          cd packages/cli
          npm install
          npm run build
          node dist/index.js scan ../.. --json > ../../scan-results.json 2>&1
          cd ../..
          echo "results<<EOF" >> $GITHUB_OUTPUT
          cat scan-results.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post scan results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('scan-results.json', 'utf8'));

            let body = '## 🛫 Preflight Scan Results\n\n';
            let total = 0;
            let passed = 0;
            let failed = 0;

            for (const cat of results) {
              body += `### ${cat.name}\n`;
              for (const check of cat.checks) {
                total++;
                const icon = check.status === 'pass' ? '✅' : check.status === 'fail' ? '❌' : '⚠️';
                if (check.status === 'pass') passed++;
                if (check.status === 'fail') failed++;
                body += `- ${icon} ${check.message}`;
                if (check.file) body += ` (\`${check.file}${check.line ? ':' + check.line : ''}\`)`;
                body += '\n';
              }
              body += '\n';
            }

            body += `**Score: ${passed}/${total}**`;
            if (failed > 0) {
              body += ` — ${failed} critical issue${failed > 1 ? 's' : ''} to fix.`;
            } else {
              body += ' — All clear.';
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body?.startsWith('## 🛫 Preflight Scan Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
