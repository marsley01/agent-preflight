apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-preflight-ingress
  namespace: agent-preflight
  labels:
    app.kubernetes.io/name: agent-preflight
    app.kubernetes.io/part-of: agent-preflight
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.agent-preflight.io
      secretName: agent-preflight-tls
  rules:
    - host: api.agent-preflight.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-preflight-service
                port:
                  name: http
