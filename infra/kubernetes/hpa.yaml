apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-preflight-hpa
  namespace: agent-preflight
  labels:
    app.kubernetes.io/name: agent-preflight
    app.kubernetes.io/part-of: agent-preflight
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-preflight
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Max
