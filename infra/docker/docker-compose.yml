x-app-defaults: &app-defaults
  build:
    context: ../../
    dockerfile: infra/docker/Dockerfile
  env_file:
    - ../../.env
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  networks:
    - preflight-network
  restart: unless-stopped

services:
  preflight-app:
    <<: *app-defaults
    container_name: preflight-app
    ports:
      - "3000:3000"
    volumes:
      - ../../apps:/app/apps:delegated
      - ../../packages:/app/packages:delegated
      - preflight_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://preflight:preflight@postgres:5432/preflight
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana-tempo:4317
    develop:
      watch:
        - action: rebuild
          path: ../../apps
          target: /app/apps
        - action: rebuild
          path: ../../packages
          target: /app/packages

  redis:
    image: redis:7-alpine
    container_name: preflight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - preflight-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: preflight-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: preflight
      POSTGRES_PASSWORD: preflight
      POSTGRES_DB: preflight
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preflight"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - preflight-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: preflight-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - preflight-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: preflight-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=preflight
      - GF_INSTALL_PLUGINS=
    networks:
      - preflight-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  preflight_node_modules:

networks:
  preflight-network:
    name: preflight-network
    driver: bridge
